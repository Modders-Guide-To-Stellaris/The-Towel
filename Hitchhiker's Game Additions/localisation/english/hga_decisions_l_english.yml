 decision_hga_ecology_project_effects_short: "Enables £district£ §YEcology Districts§!\nIncreases £housing£ §YHousing§! and §YResource Production§!\nPrevents the loss of §YBasic Resource Districts§!" #\nConstruction of any £district£ §YDistricts§! while this is underway is §RDisabled§!.
