  hga_menu.10.release_detox_techTT: "Click to swap to Ascension-based detoxification."

  hga_menu.10.force_detox_tech: "Detox: §MAscension Perk§!"
  hga_menu.100.force_detox_techTT: "Click to swap to Technology-based detoxification."

 # >- Relic Settings (hga_menu.100) -<
  hga_menu.100.name: "$hga_menu.2.nav_relic$"
  hga_menu.100.desc: "Control who can start relic wars and who can trade relics. Changes apply globally."

  # Relic Wars <<Player>>
  hga_menu.100.lock_relic_war: "Relic Wars: §GEnabled§!"
  hga_menu.100.lock_relic_warTT: "Click to disable relic wars for players."
  hga_menu.100.unlock_relic_war: "Relic Wars: §RDisabled§!"
  hga_menu.100.unlock_relic_warTT: "Click to enable relic wars for players."

  # Relic Wars <<AI>>
  hga_menu.100.lock_ai_relic_war: "AI Relic Wars: §GEnabled§!"
  hga_menu.100.lock_ai_relic_warTT: "Click to disable relic wars for the AI."
  hga_menu.100.unlock_ai_relic_war: "AI Relic Wars: §RDISABLED§!"
  hga_menu.100.unlock_ai_relic_warTT: "Click to enable relic wars for the AI."

  # Relic Trade <<Player>>
  hga_menu.100.lock_relic_trade: "Relic Trading: §GEnabled§!"
  hga_menu.100.lock_relic_tradeTT: "Click to disable relic trading for players."
  hga_menu.100.unlock_relic_trade: "Relic Trading: §RDisabled§!"
  hga_menu.100.unlock_relic_tradeTT: "Click to enable relic trading for players."

  # Relic Trade <<AI>>
  hga_menu.100.lock_ai_relic_trade: "AI Relic Trading: §GEnabled§!"
  hga_menu.100.lock_ai_relic_tradeTT: "Click to disable relic trading for the AI."
  hga_menu.100.unlock_ai_relic_trade: "AI Relic Trading: §RDisabled§!"
  hga_menu.100.unlock_ai_relic_tradeTT: "Click to enable relic trading for the AI."


 # >- Planetary Modifiers (hga_menu.110) -<
  hga_menu.110.name:0 "$hga_menu.3.nav_planetfeatures$"
  hga_menu.110.desc:0 "Configure how planetary features behave across the galaxy. Changes here affect drop rates and the strength of modifiers on any world that has them."

  hga_menu.110.features_enabled:0 "Planetary Features: §GEnabled§!"
  hga_menu.110.features_enabledTT:0 "Features are currently enabled. Click to disable them entirely. Features will no longer appear on any world."

  hga_menu.110.features_disabled:0 "Planetary Features: §RDisabled§!"
  hga_menu.110.features_disabledTT:0 "Features are currently disabled. Click to enable them."

  hga_menu.110.production_low:0 "Modifier Strength: §YLow§!"
  hga_menu.110.production_lowTT:0 "Modifiers are currently at §YLow§! strength (0.5x). Click to advance to §GMedium§!."

  hga_menu.110.production_medium:0 "Modifier Strength: §GMedium§!"
  hga_menu.110.production_mediumTT:0 "Modifiers are currently at §GMedium§! strength (1x). Click to advance to §RHigh§!."

  hga_menu.110.production_high:0 "Modifier Strength: §RHigh§!"
  hga_menu.110.production_highTT:0 "Modifiers are currently at §RHigh§! strength (1.5x). Click to wrap back to §YLow§!."

  hga_menu.110.intensity_low:0 "Drop Rate: §YLow§!"
  hga_menu.110.intensity_lowTT:0 "Features are currently set to spawn at a §YLow§! rate. Click to advance to §GMedium§!."

  hga_menu.110.intensity_medium:0 "Drop Rate: §GMedium§!"
  hga_menu.110.intensity_mediumTT:0 "Features are currently set to spawn at a §GMedium§! rate. Click to advance to §RHigh§!."

  hga_menu.110.intensity_high:0 "Drop Rate: §RHigh§!"
  hga_menu.110.intensity_highTT:0 "Features are currently set to spawn at a §RHigh§!"

  hga_menu.110.arcology_menials_off: "Arcology Menials: §RDisabled§!"
  hga_menu.110.arcology_menials_offTT: "Arcologies are restricted to standard urban and industrial districts. Click to §Genable§! basic resource production (Food, Energy, Minerals) for Ecumenopoli."

  hga_menu.110.arcology_menials_on: "Arcology Menials: §GEnabled§!"
  hga_menu.110.arcology_menials_onTT: "Arcologies can now support basic resource districts. Click to §Rdisable§! this and return to standard urban-only industrial sets."

  hga_menu.110.ecology_worlds_off: "Synthetic Genesis: §RDisabled§!"
  hga_menu.110.ecology_worlds_offTT: "Advanced Alvanian Ecogenesis is currently disabled. Click to §Genable§! the project to transform Gaia worlds into Synthetic Edens."

  hga_menu.110.ecology_worlds_on: "Synthetic Genesis: §GEnabled§!"
  hga_menu.110.ecology_worlds_onTT: "Planetary transformation projects are available. Click to §Rdisable§! the ability to create Alvanian Ecologies."

  # Hub - Crisis nav button
  # >- CRISIS SPEEDDIAL PAGE -<

  hga_menu.190.name:0 "Crisis Speeddial"
  hga_menu.190.desc:0 "Choose a crisis to fast-track into the galaxy.\n\n§YMidgame crises§! require the relevant faction to exist.\n§YEndgame crises§! require the endgame era OR the Time Override to be enabled. Only one may be summoned per game unless the Crisis Lock is disabled in Global Settings.\n\n§RAberrant§! requires the Unbidden to be active first.\n§RVehement§! requires the Aberrant to have spawned and begun fighting the Unbidden.\n\nNote: If there is a trigger that shows 'One must be true' and its the time override, that means it's limited to mid- or endgame."

  # Global Settings
  hga_menu.190.crisis_type_override_on:0 "Endgame Crisis Lock: §GEnabled§!"
  hga_menu.190.crisis_type_override_onTT:0 "Multiple endgame crises may now be summoned. Click to re-enable the one-crisis restriction."
  hga_menu.190.crisis_type_override_off:0 "Endgame Crisis Lock: §RDisabled§!"
  hga_menu.190.crisis_type_override_offTT:0 "Only one endgame crisis may be active at a time. Click to disable this restriction."

  # Global Settings
  hga_menu.190.crisis_time_override_on:0 "Crisis Time Override: §GEnabled§!"
  hga_menu.190.crisis_time_override_onTT:0 "Year requirements for crises are bypassed. Click to restore them."
  hga_menu.190.crisis_time_override_off:0 "Crisis Time Gate: §RDisabled§!"
  hga_menu.190.crisis_time_override_offTT:0 "Crises respect their mid/endgame year requirements. Click to allow summoning crises before their time."


  # Option labels
  hga_menu.190.khan:0 "Awaken the Khanate (Great Khan)"
  hga_menu.190.voidworms:0 "Poke the Nest (Voidspawn)"
  hga_menu.190.scourge:0 "Unleash the Brood (Prethoryn Scourge)"
  hga_menu.190.contingency:0 "Initialise Class-5 Singularity (Contingency)"
  hga_menu.190.unbidden:0 "Open the Wrong Astral Rift (The Unbidden)"
  hga_menu.190.aberrant:0 "Trigger an Aberrant Echo (The Aberrant)"
  hga_menu.190.vehement:0 "Invite Them to the Party (The Vehement)"
  hga_menu.190.cetana:0 "Activate the Cetana Protocol (Cetana)"

  # Tooltips
  hga_menu.190.khan_TT:0 "Requires: Midgame era OR Time Override enabled. Dormant marauders must exist. Cannot fire if the Khan has already risen."
  hga_menu.190.voidworms_TT:0 "Requires: Midgame era OR Time Override enabled. Voidworms must exist in the galaxy. Cannot fire if the Voidspawn crisis has already started."
  hga_menu.190.scourge_TT:0 "Requires: Endgame era OR Time Override enabled. Crisis Lock must be inactive OR no other endgame crisis fired recently. Can only be summoned once."
  hga_menu.190.contingency_TT:0 "Requires: Endgame era OR Time Override enabled. Crisis Lock must be inactive OR no other endgame crisis fired recently. Can only be summoned once."
  hga_menu.190.unbidden_TT:0 "Requires: Endgame era OR Time Override enabled. Crisis Lock must be inactive OR no other endgame crisis fired recently. Can only be summoned once."
  hga_menu.190.aberrant_TT:0 "Requires: The Unbidden must already have invaded. Can only be triggered once."
  hga_menu.190.vehement_TT:0 "Requires: The Aberrant must have spawned and the two portals must be fighting each other. Can only be triggered once."
  hga_menu.190.cetana_TT:0 "Requires: Endgame era OR Time Override enabled. A non-gestalt Fallen Empire must exist. No War in Heaven ongoing. Can only be summoned once."

