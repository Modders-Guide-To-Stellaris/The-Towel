 pc_hga_ecology: "Ecology"
 pc_hga_ecology_desc: "The result of the §YIdyllic Ecogenesis§! process, more commonly known as §YSynthetic Genesis§!, this world is a masterpiece of intent. By weaving high-capacity infrastructure into the very DNA of the biosphere, we have achieved a state of perfect biological synchronicity. Here, the boundary between the planet and its people has dissolved; the world does supports life and lives alongside us."