  hga_menu.3.nav_planetfeatures: "£planet£ Planetary Features"
  hga_menu.3.nav_planetfeaturesTT: "Configure planetary features, enabling, dropchance and output."

  hga_menu.9.nav_crisis:0 "Crisis Speeddial"
  hga_menu.9.nav_crisisTT:0 "Open the crisis summoning panel. Call specific crises before they decide to show up on their own schedule."

  hga_menu.1.start: "Begin the Game"
  hga_menu.1.startTT: "Close this menu and start playing."

  edict_hga_host_tool: "Host Tool"
