l_english:
 col_hga_ecology_energy: "Pulsar-Grid District"
 col_hga_ecology_energy_desc: "By tapping into the planet's synthetic ley lines, we can draw immense power directly from the synchronized planetary core."

 col_hga_ecology_minerals: "Lithic-Siphon Complex"
 col_hga_ecology_minerals_desc: "Advanced chemical precipitation basins allow for the continuous harvesting of minerals without disrupting the world's aesthetic harmony."

 col_hga_ecology_food: "Verdant-Synthesis Zone"
 col_hga_ecology_food_desc: "The pinnacle of Ecogenesis; farming districts produce a biological bounty that far exceeds the capabilities of natural soil."

 col_hga_ecology_alloys: "Bloom-Forge Sector"
 col_hga_ecology_alloys_desc: "Metals are refined in high-heat thermal pockets disguised as natural volcanic vents, integrating heavy industry into the global ecology."

 col_hga_ecology_consumer_goods: "Artisan-Grove"
 col_hga_ecology_consumer_goods_desc: "Specialized zones where nanite-rich flora 'grows' the components for advanced consumer products in a stress-free environment."

 col_hga_ecology_research: "Neural-Network Hub"
 col_hga_ecology_research_desc: "The entire planet acts as a biological supercomputer. Our scientists simply plug into the world-mind to run massive simulations."

 col_hga_ecology_trade: "Planetary Promenade"
 col_hga_ecology_trade_desc: "The world's beauty is its greatest asset, attracting traders and tourists to exchange wealth amidst the engineered splendor."

 col_hga_ecology_unity: "Synchronicity-Hub"
 col_hga_ecology_unity_desc: "By aligning the population's mental frequency with the planet's pulse, we achieve a state of perfect social and spiritual cohesion."

 col_hga_ecology_industrial: "Integrated Fabrication Complex"
 col_hga_ecology_industrial_desc: "A balanced sector where the planet's synthetic systems simultaneously support both raw metallurgy and fine fabrication."