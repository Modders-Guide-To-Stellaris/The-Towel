 hga_planetary_features.200.name: "§HAlvanian Ecology§!: [Root.GetName] Perfected"
 hga_planetary_features.200.desc: "The final sequence of the Alvanian Ecogenesis is complete, and [Root.GetName] has transitioned into a state of post-natural perfection.\n\nIt is difficult to believe this world was once merely a Gaia world—a beautiful accident of evolution. Today, it stands as a masterpiece of intent. The synthetic ley lines hum silently beneath the roots of towering, engineered groves, and the atmosphere itself has become a finely tuned instrument of our design.\n\nWe have not replaced nature with the cold indifference of steel; we have elevated it. [Root.GetName] is no longer a planet we simply inhabit—it is a world that has been taught to think, to provide, and to flourish in perfect synchronicity with our people."
 hga_planetary_features.200.a: "A true masterpiece."